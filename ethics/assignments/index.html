<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assignments — Ethics | Alonna's Study Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #F7F4FD; color: #2D1B5E; min-height: 100vh; }

    header {
      background: linear-gradient(135deg, #5A8AC4, #8BA7D9, #B4C8EE);
      padding: 36px 24px 32px;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 80% 50%, rgba(255,255,255,0.12) 0%, transparent 60%);
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
      transition: color 0.15s;
    }
    .back-link:hover { color: #fff; }
    .header-icon { font-size: 2rem; margin-bottom: 8px; position: relative; z-index: 1; }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 700;
      color: #fff;
      position: relative;
      z-index: 1;
      text-shadow: 0 1px 8px rgba(0,0,0,0.15);
    }
    .header-sub {
      color: rgba(255,255,255,0.78);
      font-size: 0.85rem;
      margin-top: 4px;
      position: relative;
      z-index: 1;
    }

    main { max-width: 720px; margin: 0 auto; padding: 40px 20px 80px; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #8B73B8;
    }
    .empty-icon { font-size: 3.5rem; margin-bottom: 16px; opacity: 0.5; }
    .empty-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: #5A3F8A; margin-bottom: 8px; }
    .empty-text { font-size: 0.88rem; line-height: 1.6; color: #8B73B8; max-width: 320px; margin: 0 auto; }

    .files-list { display: flex; flex-direction: column; gap: 12px; }

    .file-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #fff;
      border-radius: 14px;
      padding: 16px 18px;
      text-decoration: none;
      color: #2D1B5E;
      box-shadow: 0 2px 12px rgba(124,92,191,0.08);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .file-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(124,92,191,0.15);
    }
    .file-dot {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: #EDF2FB;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }
    .file-name { font-weight: 500; font-size: 0.92rem; }
    .file-arrow { margin-left: auto; color: #5A8AC4; font-size: 1rem; }

    footer {
      text-align: center;
      padding: 24px;
      color: #8B73B8;
      font-size: 0.78rem;
      border-top: 1px solid #EDE6F8;
    }
    footer a { color: #5A8AC4; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <header>
    <a href="../../index.html" class="back-link">← Back to Study Hub</a>
    <div class="header-icon">📝</div>
    <h1>Assignments</h1>
    <div class="header-sub">Ethics</div>
  </header>

  <main>
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">📝</div>
      <div class="empty-title">Nothing here yet</div>
      <div class="empty-text">Ask Claude to create a assignments for Ethics and it'll be added right here.</div>
    </div>
    <div class="files-list" id="files-list" style="display:none;"></div>
  </main>

  <footer>
    <a href="../../index.html">← Alonna's Study Hub</a>
  </footer>
</body>
</html>
